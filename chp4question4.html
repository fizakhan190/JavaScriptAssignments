    <h3> Rules for naming JS variables</h3>
    <p1> Variable names can only contain numbers,$, and _. For example: $my_1stvariable</p1><br>
    <p1> Variable must begin with a letter $ or _. For example: $name, _name, or name.</p1><br>
    <p1>Variables names are case sensitive.</p1><br>
    <p1>Variable names should not be JS keywords</p1><br>
